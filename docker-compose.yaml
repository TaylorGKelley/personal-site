services:
  nextjs-app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner # Targets the final production stage
    container_name: nextjs_production
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
